# Public (non-secret) Sentry DSN for front-end error + session-replay reporting.
# Templated into config/global.const.js at build time and used by global.js,
# which only initialises Sentry once the visitor accepts cookies.
sentry_dsn: "https://ece1cf551796dd8721878a83df1c4091@o4511762267111424.ingest.de.sentry.io/4511791309062224"

# Live-data API endpoints for the smart-home page (and the CV page's indoor-temp
# link). Each API has a production URL (the Fastly CDN) and a dev URL (a locally
# running Cloud Run function). The pages use production by default — even on a
# local `jekyll serve` — so flip a `*_use_local` flag to true only while running
# that function locally, then rebuild. Flags are per-API, so one endpoint can
# point at localhost while the other stays on the CDN. When a flag is on, the
# layout also whitelists that dev origin in the page's connect-src CSP.
smart_home_smart_things_climate_url_prod: "https://cdn.christianbrown.uk/get-smartthings-climate"
smart_home_smart_things_climate_url_dev: "http://127.0.0.1:8080"
smart_home_smart_things_climate_use_local: false

smart_home_met_office_weather_url_prod: "https://cdn.christianbrown.uk/get-met-office-weather"
smart_home_met_office_weather_url_dev: "http://127.0.0.1:8081"
smart_home_met_office_weather_use_local: false

smart_home_historical_climate_url_prod: "https://cdn.christianbrown.uk/get-historical-climate-data"
smart_home_historical_climate_url_dev: "http://127.0.0.1:8082"
smart_home_historical_climate_use_local: false

header_safari_tab_mask_color: "#5bbad5"
header_theme_color: "#ffffff"
header_msapplication_tile_color: "#ffffff"

collections:
  - "education"
  - "professional_experience"

# Fail the build on Liquid syntax errors instead of rendering them silently, so
# CI's `jekyll build --strict_front_matter` acts as a real rendering gate.
liquid:
  error_mode: strict

# Never publish test tooling or the coverage report to the live site (the
# coverage report used to leak to christianbrown.uk/coverage/ because it isn't
# excluded by default). Co-located *.test.js files are excluded via a glob.
exclude:
  - "coverage"
  - "node_modules"
  - "package.json"
  - "package-lock.json"
  - "vitest.config.js"
  - "*.test.js"
  - "assets/js/*.test.js"
  - "assets/js/smart-home/*.test.js"
  - "config/stylelint-jekyll-scss.mjs"
