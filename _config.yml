
url: "https://christianbrown.uk"

site_locale: "en_GB"
site_name: "Christian Brown"
site_author: "Christian Brown"
site_image_name: "Christian Brown's avatar"

header_name: "Christian Brown"
header_job_title: "Engineering Manager"
header_location: "London, UK"

google_analytics_id: "G-9Z9L9Z6QHQ"

header_safari_tab_mask_color: "#5bbad5"
header_theme_color: "#ffffff"
header_msapplication_tile_color: "#ffffff"

collections:
  - "education"
  - "professional_experience"

# Fail the build on Liquid syntax errors instead of rendering them silently, so
# CI's `jekyll build --strict_front_matter` acts as a real rendering gate.
liquid:
  error_mode: strict

# Never publish test tooling or the coverage report to the live site (the
# coverage report used to leak to christianbrown.uk/coverage/ because it isn't
# excluded by default). Co-located *.test.js files are excluded via a glob.
exclude:
  - "coverage"
  - "node_modules"
  - "package.json"
  - "package-lock.json"
  - "vitest.config.js"
  - "*.test.js"
  - "assets/js/*.test.js"
  - "assets/js/smart-home/*.test.js"
  - "config/stylelint-jekyll-scss.mjs"
