<h2>Contact me</h2>
<div class="contact-form">
    <form method="POST" action="https://forms.un-static.com/forms/f0d44531233d6f8cdaabb58a761c5bf43b87917a">
        <div class="form-group">
            <label for="contact-form-name" class="form-label">Your name:</label>

        </div>
        <div class="form-group">
            <label for="contact-form-email" class="form-label">Your email address:</label>
            <input id="contact-form-email" type="email" name="email" required="required" class="form-control" placeholder="Your email address here">
        </div>
        <div class="form-group">
            <label for="contact-form-body" class="form-label">Your message:</label>
            <textarea id="contact-form-body" name="body" required="required" class="form-control" rows="10" placeholder="Your message here"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
