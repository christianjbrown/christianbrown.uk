<h2>Smart home</h2>

<p>Time in London: <span id="time">[Unknown]</span></p>
<h3>Current weather forecast</h3>

<table id="met-weather" class="smart-home-table">
    <tr>
        <td>[Loading..]</td>
    </tr>
</table>

<h3>Current inside temperatures</h3>

<table id="smart-home-temperature-table" class="smart-home-table">
    <tr>
        <td>[Loading..]</td>
    </tr>
</table>

<script>

    const metWeatherTable = document.querySelector('#met-weather');
    const smartHomeTemperatureTable = document.querySelector('#smart-home-temperature-table');

    function clearTable(table) {
        table.querySelectorAll('tr').forEach(
            function (node) {
                node.remove();
            }
        );
    }

    function timeDifference(timestamp) {
        const msPerMinute = 60;
        const msPerHour = msPerMinute * 60;
        const msPerDay = msPerHour * 24;
        const elapsed = Math.floor(Date.now()/1000) - timestamp;
        if (elapsed < 60) {
            return Math.floor(elapsed) + ' sec(s) ago';
        } else if (elapsed < 3600) {
            return Math.floor(elapsed/msPerMinute) + ' min(s) ago';
        } else if (elapsed < 216000) {
            return Math.floor(elapsed/msPerHour ) + ' hr(s) ago';
        } else {
            return Math.floor(elapsed/msPerDay) + ' day(s) ago';
        }
    }

    function freedomUnits(c) {
        return (c * 1.8) + 32;
    }

    function addTableRow(table, name, value, valueMuted, nameMuted = null) {

        const newRow = table.insertRow();

        const nameCell = newRow.insertCell();
        nameCell.append(name);

        if (nameMuted) {
            const nameCellSpanMuted = document.createElement('span');
            nameCellSpanMuted.setAttribute('class', 'muted');
            nameCellSpanMuted.append(nameMuted);
            nameCell.append(nameCellSpanMuted);
        }

        const valueCell = newRow.insertCell();

        const valueCellSpanMain = document.createElement('span');
        valueCellSpanMain.setAttribute('class', 'value');
        valueCellSpanMain.append(value);
        valueCell.append(valueCellSpanMain);

        if (valueMuted) {
            const valueCellSpanMuted = document.createElement('span');
            valueCellSpanMuted.setAttribute('class', 'muted');
            valueCellSpanMuted.append(valueMuted);
            valueCell.append(valueCellSpanMuted);
        }
    }

    function updateMetWeather() {
        fetch('https://christianbrown.global.ssl.fastly.net/get-met-office-temps')
            .then(response => response.json())
            .then(
                function (data) {
                    if (data instanceof Object && data['data'] instanceof Object) {
                        clearTable(metWeatherTable);
                        Object.entries(data['data']).forEach(
                            function (entry) {
                                const [key, value] = entry;
                                console.log(key, value);

                            }
                        );
                        if (typeof data['data']['temp'] === 'number') {
                            addTableRow(metWeatherTable, 'Temperature', data['data']['temp'].toFixed(1)+'°c', freedomUnits(data['data']['temp']).toFixed(1)+'°f');
                        }
                        if (typeof data['data']['temp_feels_like'] === 'number' && data['data']['temp'] !== data['data']['temp_feels_like']) {
                            addTableRow(metWeatherTable, 'Temperature feels like', data['data']['temp_feels_like'].toFixed(1)+'°c', freedomUnits(data['data']['temp_feels_like']).toFixed(1)+'°f');
                        }
                        if (typeof data['data']['humidity'] === 'number') {
                            addTableRow(metWeatherTable, 'Humidity', data['data']['humidity']+'%');
                        }
                        if (typeof data['data']['precipitation'] === 'number') {
                            addTableRow(metWeatherTable, 'Precipitation', data['data']['precipitation']+'% chance');
                        }
                    }
                }
            )
            .catch(
                function (err) {
                    console.error(err);

                    clearTable(metWeatherTable);

                    smartHomeTemperatureTable.insertRow().insertCell().append('[Error "'+err.message+'", try again later.]');
                }
            );

        const londonTime = (new Intl.DateTimeFormat('en', {'timezone': 'Europe/London', 'timeStyle': 'short'})).format(new Date());
        const time = document.querySelector('#time');
        time.replaceChildren(londonTime);
    }

    function updateSmartHomeTemperatures() {
        fetch('https://christianbrown.global.ssl.fastly.net/get-smart-home-temps')
            .then(response => response.json())
            .then(
                function (data) {
                    clearTable(smartHomeTemperatureTable);
                    if (data instanceof Object && data['devices'] instanceof Array) {
                        data['devices'].forEach(
                            function (dataPoint) {
                                if (typeof dataPoint['name'] == 'string' && typeof dataPoint['timestamp'] == 'number' && typeof dataPoint['temp'] == 'number') {
                                    addTableRow(smartHomeTemperatureTable, dataPoint['name'], dataPoint['temp'].toFixed(1)+'°c', freedomUnits(dataPoint['temp']).toFixed(1)+'°f', timeDifference(dataPoint['timestamp']));
                                } else {
                                    console.log(dataPoint);
                                    throw new Error('Unexpected data');
                                }
                            }
                        );
                    }
                }
            )
            .catch(
                function (err) {
                    console.error(err);

                    // clearInterval(timerId); -- commenting out for now, we'll try again every minute.
                    clearTable(smartHomeTemperatureTable);

                    smartHomeTemperatureTable.insertRow().insertCell().append('[Error "'+err.message+'", try again later.]');
                }
            );

        const londonTime = (new Intl.DateTimeFormat('en', {'timezone': 'Europe/London', 'timeStyle': 'short'})).format(new Date());
        const time = document.querySelector('#time');
        time.replaceChildren(londonTime);
    }

    window.addEventListener('load', updateSmartHomeTemperatures);
    window.addEventListener('load', updateMetWeather);

    const timerId = setInterval(updateSmartHomeTemperatures, 60 * 1000);

</script>
