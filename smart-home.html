<h2>Smart home</h2>

<p>Time in London: <span id="time">[Unknown]</span></p>
<h3>Current temperatures</h3>

<table id="temperatures">
    <tr>
        <td>Loading..</td>
    </tr>
</table>

<script>
    function timeDifference(timestamp) {
        const msPerMinute = 60;
        const msPerHour = msPerMinute * 60;
        const msPerDay = msPerHour * 24;
        const elapsed = Math.floor(Date.now()/1000) - timestamp;
        if (elapsed < 60) {
            return Math.floor(elapsed) + ' sec(s) ago';
        } else if (elapsed < 3600) {
            return Math.floor(elapsed/msPerMinute) + ' min(s) ago';
        } else if (elapsed < 216000) {
            return Math.floor(elapsed/msPerHour ) + ' hr(s) ago';
        } else {
            return Math.floor(elapsed/msPerDay) + ' day(s) ago';
        }
    }

    function freedomUnits(c) {
        return (c * 1.8) + 32;
    }

    fetch('https://europe-west2-christianbrown.cloudfunctions.net/get-temperatures')
        .then(response => response.json())
        .then(
            function (data) {
                const table = document.querySelector('#temperatures');
                table.querySelectorAll('tr').forEach(
                    function (node) {
                        node.remove();
                    }
                );
                if (Array.isArray(data['devices'])) {
                    data['devices'].forEach(
                        function (dataPoint) {
                            const newRow = table.insertRow();

                            const nameCell = newRow.insertCell();
                            nameCell.append(dataPoint['name']);

                            const nameCellSpan1 = document.createElement('span');
                            nameCellSpan1.setAttribute('class', 'muted');
                            nameCellSpan1.append(timeDifference(dataPoint['timestamp']));
                            nameCell.append(nameCellSpan1);

                            const tempCell = newRow.insertCell();

                            const tempCellSpan1 = document.createElement('span');
                            tempCellSpan1.setAttribute('class', 'temp');
                            tempCellSpan1.append(dataPoint['temp'].toFixed(1)+'°c');
                            tempCell.append(tempCellSpan1);

                            const tempCellSpan2 = document.createElement('span');
                            tempCellSpan2.setAttribute('class', 'muted');
                            tempCellSpan2.append(freedomUnits(dataPoint['temp']).toFixed(1)+'°f');
                            tempCell.append(tempCellSpan2);
                        }
                    );
                }
            }
        );

    const londonTime = (new Intl.DateTimeFormat('en', {'timezone': 'Europe/London', 'timeStyle': 'short'})).format(new Date());
    const time = document.querySelector('#time');
    time.replaceChildren(londonTime);

</script>
