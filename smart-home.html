<h2>Smart home</h2>

<p>Time in London: <span id="time">[Unknown]</span></p>
<h3>Current weather forecast</h3>

<table id="met-weather-table" class="smart-home-table">
    <tr>
        <td>[Loading..]</td>
    </tr>
</table>

<h3>Current inside temperatures</h3>

<table id="smart-home-temperature-table" class="smart-home-table">
    <tr>
        <td>[Loading..]</td>
    </tr>
</table>

<script>
    const MET_WEATHER_API_URL = 'https://christianbrown.global.ssl.fastly.net/get-met-office-temps';
    const SMART_HOME_API_URL = 'https://christianbrown.global.ssl.fastly.net/get-smart-home-temps';

    const metWeatherTable = document.querySelector('#met-weather-table');
    const smartHomeTemperatureTable = document.querySelector('#smart-home-temperature-table');

    function clearTable(table) {
        table.querySelectorAll('tr').forEach(
            function (node) {
                node.remove();
            }
        );
    }

    function timeDifference(timestamp) {
        const msPerMinute = 60;
        const msPerHour = msPerMinute * 60;
        const msPerDay = msPerHour * 24;
        const elapsed = Math.floor(Date.now()/1000) - timestamp;
        if (elapsed < 60) {
            return Math.floor(elapsed) + ' sec(s) ago';
        } else if (elapsed < 3600) {
            return Math.floor(elapsed/msPerMinute) + ' min(s) ago';
        } else if (elapsed < 216000) {
            return Math.floor(elapsed/msPerHour ) + ' hr(s) ago';
        } else {
            return Math.floor(elapsed/msPerDay) + ' day(s) ago';
        }
    }

    function freedomUnits(c) {
        return (c * 1.8) + 32;
    }

    function addOutsideTempTableRow(name, degreesC, timestamp = null, stale = false, important = false) {
        addTempTableRow(metWeatherTable, name, degreesC, timestamp, stale, important);
    }

    function addInsideTempTableRow(name, degreesC, timestamp = null, stale = false, important = false) {
        addTempTableRow(smartHomeTemperatureTable, name, degreesC, timestamp, stale, important);
    }

    function addTempTableRow(table, name, degreesC, timestamp, stale = false, important = false) {
        addTableRow(table, name, degreesC.toFixed(1)+'°c', freedomUnits(degreesC).toFixed(1)+'°f', timestamp ? timeDifference(timestamp) : null, stale, important);
    }


    function addTableRow(table, primaryKey, primaryValue, secondaryValue, secondaryKey = null, muted = null, importantPrimary = false) {
        const row = table.insertRow();

        const columnLeft = row.insertCell();
        columnLeft.append(getTableCellSpan(primaryKey, 'primary', muted, importantPrimary));
        if (secondaryKey) {
            columnLeft.append(getTableCellSpan(secondaryKey, 'secondary', muted));
        }

        const columnRight = row.insertCell();
        columnRight.append(getTableCellSpan(primaryValue, 'primary', muted, importantPrimary));
        if (secondaryValue) {
            columnRight.append(getTableCellSpan(secondaryValue, 'secondary', muted));
        }
    }

    function getTableCellSpan(text, cssClass, muted, important) {
        const span = document.createElement('span');
        if (important) {
            cssClass += ' important';
        } else if (muted) {
            cssClass += ' muted';
        }
        span.setAttribute('class', cssClass);
        span.append(text);

        return span;
    }

    function updateMetWeather() {
        fetch(MET_WEATHER_API_URL)
            .then(response => response.json())
            .then(
                function (data) {
                    if (data instanceof Object && data['data'] instanceof Object) {
                        clearTable(metWeatherTable);
                        // Object.entries(data['data']).forEach(
                        //     function (entry) {
                        //         const [key, value] = entry;
                        //     }
                        // );
                        if (typeof data['data']['temp'] === 'number') {
                            addOutsideTempTableRow('Temperature', data['data']['temp'], null, false, true);
                        }
                        if (typeof data['data']['temp_feels_like'] === 'number' && data['data']['temp'] !== data['data']['temp_feels_like']) {
                            addOutsideTempTableRow('Temperature feels like', data['data']['temp_feels_like']);
                        }
                        if (typeof data['data']['humidity'] === 'number') {
                            addTableRow(metWeatherTable, 'Humidity', data['data']['humidity']+'%');
                        }
                        if (typeof data['data']['precipitation'] === 'number') {
                            addTableRow(metWeatherTable, 'Chance of precipitation', data['data']['precipitation']+'%');
                        }
                    }
                }
            )
            .catch(
                function (err) {
                    console.error(err);
                    clearTable(metWeatherTable);
                    metWeatherTable.insertRow().insertCell().append('Error "'+err.message+'", try again later.');
                }
            );
    }

    function updateSmartHomeTemperatures() {
        fetch(SMART_HOME_API_URL)
            .then(response => response.json())
            .then(
                function (data) {
                    clearTable(smartHomeTemperatureTable);
                    if (data instanceof Object && data['devices'] instanceof Array) {
                        if (typeof data['averageTempDegrees'] === 'number' && typeof data['averageTempTimestamp'] === 'number') {
                            addInsideTempTableRow('Average', data['averageTempDegrees'], data['averageTempTimestamp'], false, true);
                        }
                        data['devices'].forEach(
                            function (dataPoint) {
                                if (typeof dataPoint['name'] == 'string' && typeof dataPoint['timestamp'] == 'number' && typeof dataPoint['temp'] == 'number' && typeof dataPoint['stale'] == 'boolean') {
                                    addInsideTempTableRow(dataPoint['name'], dataPoint['temp'], dataPoint['timestamp'], dataPoint['stale']);
                                } else {
                                    throw new Error('Unexpected data');
                                }
                            }
                        );
                    }
                }
            )
            .catch(
                function (err) {
                    console.error(err);
                    clearTable(smartHomeTemperatureTable);
                    smartHomeTemperatureTable.insertRow().insertCell().append('Error "'+err.message+'", try again later.');
                }
            );

    }

    function updateTime() {
        const now = new Date();
        const londonTimeFormatOptions1 = {
            'timeZone': 'Europe/London',
            'hourCycle': 'h23',
            'hour': '2-digit',
            'minute': '2-digit'
        };
        const londonTimeFormat1 = new Intl.DateTimeFormat('en-GB', londonTimeFormatOptions1);
        const londonTime1 = londonTimeFormat1.format(now);

        const londonTimeFormatOptions2 = {
            'timeZone': 'Europe/London',
            'hour': 'numeric',
            'minute': '2-digit',
            'hour12': true,
        };
        const londonTimeFormat2 = new Intl.DateTimeFormat('en-GB', londonTimeFormatOptions2);
        const londonTime2 = londonTimeFormat2.format(now);

        const text = londonTime1 + ' (' + londonTime2 + ')';

        const time = document.querySelector('#time');
        time.replaceChildren(text);
    }

    window.addEventListener('load', updateSmartHomeTemperatures);
    window.addEventListener('load', updateMetWeather);
    window.addEventListener('load', updateTime);
    setInterval(updateSmartHomeTemperatures, 60 * 1000);
    setInterval(updateMetWeather, 5 * 60 * 1000);
    setInterval(updateTime, 60 * 1000);
</script>
