<h2>Smart home</h2>

<h3>Current temperatures</h3>

<table id="temperatures">
    <tr>
        <td>Loading..</td>
    </tr>
</table>

<script>
    function timeDifference(timestamp) {
        const msPerMinute = 60;
        const msPerHour = msPerMinute * 60;
        const msPerDay = msPerHour * 24;
        const elapsed = Math.floor(Date.now()/1000) - timestamp;
        if (elapsed < 60) {
            return Math.floor(elapsed) + ' sec(s) ago';
        } else if (elapsed < 3600) {
            return Math.floor(elapsed/msPerMinute) + ' min(s) ago';
        } else if (elapsed < 216000) {
            return Math.floor(elapsed/msPerHour ) + ' hr(s) ago';
        } else {
            return Math.floor(elapsed/msPerDay) + ' day(s) ago';
        }
    }

    fetch('https://europe-west2-christianbrown.cloudfunctions.net/get-temperatures')
        .then(response => response.json())
        .then(
            function (data) {
                const table = document.querySelector('#temperatures');
                table.querySelectorAll('tr').forEach(
                    function (node) {
                        node.remove();
                    }
                );
                data.forEach(
                    function (dataPoint) {
                        const newRow = table.insertRow();
                        const nameCell = newRow.insertCell();
                        nameCell.append(dataPoint['name']);
                        const nameCellSpan = document.createElement('span');
                        nameCellSpan.append(timeDifference(dataPoint['timestamp']));
                        nameCell.append(nameCellSpan);
                        newRow.insertCell().append(dataPoint['temp']+'°c');
                    }
                );
            }
        );
</script>
